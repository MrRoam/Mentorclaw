<!doctype html>
<html class="light" lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MentorClaw AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    />

              error: "#9e422c",
              "on-surface": "#31332e",

            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            fontFamily: {
              headline: ["Newsreader", "serif"],
              body: ["Plus Jakarta Sans", "sans-serif"],
              label: ["Plus Jakarta Sans", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="bg-background text-on-background">
    <div id="app">
      <div class="min-h-screen flex items-center justify-center bg-background px-6">
        <div class="text-center">
          <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-xl bg-primary text-on-primary">
            <span class="material-symbols-outlined">school</span>
          </div>
          <h1 class="font-headline text-4xl font-bold text-primary">MentorClaw</h1>
          <p class="mt-3 text-sm tracking-[0.24em] uppercase text-on-surface-variant">Loading atelier</p>
